# Netlify configuration for MYW Logistics
# Static HTML site — no build step required.

[build]
  publish = "."

# Enable "pretty URLs" — Netlify already strips .html from URLs by default,
# but pretty_urls explicitly redirects .html → clean URL.
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# --- Security & caching headers ---

# Default: secure headers for HTML pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# HTML — short cache so content updates propagate quickly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sitemap & robots — short cache
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"

# Static assets — long cache (immutable)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- Redirects ---

# Trailing-slash form for the guides hub
[[redirects]]
  from = "/guides"
  to = "/guides/"
  status = 301
  force = false

# Legacy / common typos → canonical paths
[[redirects]]
  from = "/blog"
  to = "/guides/"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/guides/:splat"
  status = 301

[[redirects]]
  from = "/guide"
  to = "/guides/"
  status = 301
